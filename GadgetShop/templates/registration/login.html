{% extends "base.html" %}

{% block title %}Вход | GadgetShop{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-4 text-center">Вход в аккаунт</h1>

                {% if form.errors %}
                    <div class="alert alert-danger">Неверный логин или пароль.</div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                            <input type="{% if field.name == 'password' %}password{% else %}text{% endif %}"
                                   name="{{ field.name }}" id="{{ field.id_for_label }}" class="form-control" required>
                        </div>
                    {% endfor %}
                    <input type="hidden" name="next" value="{{ next }}">
                    <button type="submit" class="btn btn-gs w-100">Войти</button>
                </form>

                <p class="text-center small mt-3 mb-0">
                    Нет аккаунта? <a href="{% url 'main:register' %}">Зарегистрироваться</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
