<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Главная | GadgetShop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <style>
        /* Базовые настройки, новый фон и запрет выделения/копирования */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19; /* Измененный цвет фона (глубокий полуночно-синий) */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Запрет выделения и копирования текста */
            -webkit-user-select: none; /* Safari */
            -moz-user-select: none; /* Firefox */
            -ms-user-select: none; /* IE10+/Edge */
            user-select: none; /* Стандартный синтаксис */
        }

        /* Анимация появления контента при загрузке страницы */
        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Контейнер контента */
        .hero-section {
            text-align: center;
            padding: 0 20px;
            max-width: 800px;
        }

        /* Типографика с применением анимации (с задержками для эффекта каскада) */
        h1 {
            font-size: 3.5em;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            opacity: 0;
            animation: fadeSlideUp 0.8s ease-out forwards;
        }

        p.subtitle {
            font-size: 1.25em;
            line-height: 1.6;
            margin-bottom: 50px;
            color: #94a3b8; 
            font-weight: 400;
            opacity: 0;
            animation: fadeSlideUp 0.8s ease-out 0.2s forwards;
        }

        /* Контейнер для кнопок с анимацией */
        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            opacity: 0;
            animation: fadeSlideUp 0.8s ease-out 0.4s forwards;
        }

        /* Эффект ЖИДКОГО СТЕКЛА для кнопок */
        .btn {
            position: relative;
            display: inline-block;
            padding: 16px 36px;
            font-size: 1.05em;
            font-weight: 500;
            color: #ffffff;
            text-decoration: none;
            border-radius: 12px;
            overflow: hidden;
            
            /* Базовое стекло */
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            
            /* Стеклянные грани */
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            
            transition: all 0.4s ease;
            z-index: 1;
        }

        /* Световой блик, пробегающий при наведении */
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transform: skewX(-25deg);
            transition: left 0.6s ease;
            z-index: -1;
        }

        /* Анимация блика и уплотнение стекла при наведении */
        .btn:hover::before {
            left: 200%;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1); 
            transform: translateY(-3px); 
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Акцентная (главная) кнопка */
        .btn-primary {
            background: rgba(52, 152, 219, 0.1);
            border-top: 1px solid rgba(52, 152, 219, 0.4);
            border-left: 1px solid rgba(52, 152, 219, 0.2);
            color: #e0f2fe;
        }

        .btn-primary:hover {
            background: rgba(52, 152, 219, 0.25);
            border-top: 1px solid rgba(52, 152, 219, 0.6);
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <h1>Добро пожаловать в GadgetShop</h1>
        
        <p class="subtitle">
            Ваш надежный проводник в мире современных технологий. Мы предлагаем лучшие портативные гаджеты, аксессуары и электронику по самым выгодным ценам с гарантией качества.
        </p>
        
        <div class="button-group">
            <a href="{% url 'main:product_list' %}" class="btn btn-primary">Перейти в каталог</a>
            <a href="{% url 'main:about' %}" class="btn">Об авторе</a>
            <a href="{% url 'main:shop' %}" class="btn">О магазине</a>
        </div>
    </section>

</body>
</html>
