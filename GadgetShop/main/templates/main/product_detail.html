<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ product.name }} — Детали товара</title>
    <style>
        .product-card { max-width: 800px; margin: 20px auto; border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
        .back-link { display: inline-block; margin-bottom: 15px; text-decoration: none; color: #007bff; }
        .spec { margin: 10px 0; font-size: 1.1em; }
        .label { font-weight: bold; color: #555; }
        .description { margin-top: 20px; line-height: 1.6; border-top: 1px solid #eee;}
    </style>
</head>
<body>

<div class="product-card">
    <!-- Ссылка назад к списку -->
    <a href="{% url 'main:product_list' %}" class="back-link">← Назад в каталог</a>

    <h1>{{ product.name }}</h1>

    <div class="spec">
        <span class="label">Категория:</span> {{ product.category.name }}
    </div>

    <div class="spec">
        <span class="label">Производитель:</span> {{ product.manufacter.name }}
    </div>

    <div class="description">
        <h3>Описание товара</h3>
        <p>{{ product.description|linebreaks }}</p>
    </div>

    <hr>
    <p><small>ID товара: {{ product.pk }}</small></p>
</div>

</body>
</html>
