{% load static %}
<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}GadgetShop{% endblock %}</title>
    <script>
    (function () {
        try {
            var t = localStorage.getItem('gadgetshop-theme');
            if (t === 'light' || t === 'dark') {
                document.documentElement.setAttribute('data-theme', t);
            }
        } catch (e) {}
    })();
    </script>
    <link rel="stylesheet" href="{% static 'main/css/main.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    <header class="nav-header">
        <div class="shell" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <a href="{% url 'main:home' %}" class="logo">
                <img src="{% static 'main/logo.svg' %}" alt="Logo">
                <span>GadgetShop</span>
            </a>
            
            <div class="nav-links">
                {% block nav_links %}
                {% endblock %}
                <button type="button" class="theme-toggle" id="theme-toggle" title="Переключить тему">
                    <span id="theme-icon">🌙</span>
                </button>
            </div>
        </div>
    </header>

    <main class="page-wrap">
        {% block content %}{% endblock %}
    </main>

    <footer class="shell mt-4 text-center text-muted" style="padding-bottom: 40px;">
        <p>© 2026 GadgetShop — Магазин портативных гаджетов</p>
    </footer>

    {% block extra_js %}{% endblock %}
    <script>
    (function () {
        const root = document.documentElement;
        const btn = document.getElementById('theme-toggle');
        const icon = document.getElementById('theme-icon');
        const key = 'gadgetshop-theme';

        function apply(theme) {
            root.setAttribute('data-theme', theme);
            icon.textContent = theme === 'dark' ? '🌙' : '☀️';
            try { localStorage.setItem(key, theme); } catch (e) {}
        }

        try {
            const saved = localStorage.getItem(key) || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            apply(saved);
        } catch (e) {}

        if (btn) {
            btn.addEventListener('click', () => {
                const current = root.getAttribute('data-theme');
                apply(current === 'dark' ? 'light' : 'dark');
            });
        }
    })();
    </script>
</body>
</html>
