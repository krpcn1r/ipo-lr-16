{% extends "main/base.html" %}

{% block title %}Заказ оформлен | GadgetShop{% endblock %}

{% block content %}
<div class="shell animate-fade-up">
    <div class="glass-panel text-center" style="max-width: 600px; margin: 60px auto; padding: 48px;">
        <div style="font-size: 4rem; margin-bottom: 24px;">✅</div>
        <h1 class="mb-4">Заказ оформлен!</h1>
        
        <p class="text-secondary mb-4" style="font-size: 1.1rem; line-height: 1.6;">
            Спасибо за покупку! Мы отправили электронный чек и детали заказа на вашу почту:
        </p>

        <div style="background: var(--bg-surface-elevated); padding: 16px 24px; border-radius: var(--radius-md); display: inline-block; font-size: 1.25rem; font-weight: 700; border: 1px solid var(--glass-border); margin-bottom: 32px;">
            {{ email }}
        </div>
        
        <div>
            <a href="{% url 'main:product_list' %}" class="btn btn-primary" style="padding: 16px 32px;">Продолжить покупки</a>
        </div>
    </div>
</div>
{% endblock %}
